name: HPE-AFF Lint

on:
  push:
    branches:
      - 'feature/**'
      - 'pdf-synth'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install project + dev deps
        run: uv sync --frozen

      - name: Lint with ruff
        run: uv run ruff check src/aff/ tests/

      - name: Lint with pylint (errors only)
        run: uv run pylint --disable=all --enable=E src/aff/
