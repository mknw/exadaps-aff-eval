name: HPE-AFF Lint

on:
  push:
    branches:
      - 'feature/**'
      - 'pdf-synth'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linting tools
        run: pip install ruff pylint

      - name: Lint with ruff
        run: python -m ruff check src/aff/ tests/

      - name: Lint with pylint (errors only)
        run: python -m pylint --disable=all --enable=E src/aff/
